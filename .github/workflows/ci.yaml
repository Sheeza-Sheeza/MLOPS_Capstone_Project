name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  project-testing:
    runs-on: ubuntu-latest
    env:
      DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}
      DAGSHUB_REPO_OWNER: ${{ secrets.DAGSHUB_REPO_OWNER }}
      DAGSHUB_REPO_NAME: ${{ secrets.DAGSHUB_REPO_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Configure environment
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
        run: |
          trim() { printf '%s' "$1" | tr -d '\n\r' | sed 's/[[:space:]]*$//'; }
          AWS_ACCESS_KEY_ID=$(trim "$AWS_ACCESS_KEY_ID")
          AWS_SECRET_ACCESS_KEY=$(trim "$AWS_SECRET_ACCESS_KEY")
          AWS_REGION=$(trim "$AWS_REGION")
          AWS_BUCKET_NAME=$(trim "$AWS_BUCKET_NAME")
          if [ -z "$DAGSHUB_USER_TOKEN" ]; then
            echo "DAGSHUB_USER_TOKEN is not set in GitHub repository secrets."
            exit 1
          fi
          if [ -z "$DAGSHUB_REPO_OWNER" ] || [ -z "$DAGSHUB_REPO_NAME" ]; then
            echo "DAGSHUB_REPO_OWNER and DAGSHUB_REPO_NAME must be set in GitHub repository secrets."
            exit 1
          fi
          {
            echo "DAGSHUB_USER_TOKEN=${DAGSHUB_USER_TOKEN}"
            echo "DAGSHUB_REPO_OWNER=${DAGSHUB_REPO_OWNER}"
            echo "DAGSHUB_REPO_NAME=${DAGSHUB_REPO_NAME}"
            echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}"
            echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}"
            echo "AWS_REGION=${AWS_REGION}"
            echo "AWS_BUCKET_NAME=${AWS_BUCKET_NAME}"
          } > .env

      - name: Run DVC pipeline
        env:
          RAW_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          RAW_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          RAW_AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          trim() { printf '%s' "$1" | tr -d '\n\r' | sed 's/[[:space:]]*$//'; }
          export AWS_ACCESS_KEY_ID=$(trim "$RAW_AWS_ACCESS_KEY_ID")
          export AWS_SECRET_ACCESS_KEY=$(trim "$RAW_AWS_SECRET_ACCESS_KEY")
          export AWS_DEFAULT_REGION=$(trim "$RAW_AWS_REGION")
          dvc repro

      - name: Run model tests
        run: python -m unittest tests/test_model.py

      - name: Promote model to production
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: python scripts/promote_model.py

      - name: Run Flask app tests
        if: success()
        run: python -m unittest tests/test_flask_app.py

  deploy:
    runs-on: ubuntu-latest
    needs: project-testing
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sanitize AWS credentials
        env:
          RAW_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          RAW_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          RAW_AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          trim() { printf '%s' "$1" | tr -d '\n\r' | sed 's/[[:space:]]*$//'; }
          AWS_ACCESS_KEY_ID=$(trim "$RAW_AWS_ACCESS_KEY_ID")
          AWS_SECRET_ACCESS_KEY=$(trim "$RAW_AWS_SECRET_ACCESS_KEY")
          AWS_DEFAULT_REGION=$(trim "$RAW_AWS_REGION")
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ] || [ -z "$AWS_DEFAULT_REGION" ]; then
            echo "AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and AWS_REGION must be set in GitHub repository secrets."
            exit 1
          fi
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

